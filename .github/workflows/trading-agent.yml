# Trading Agent — GitHub Actions runner
#
# USE THIS IF: you can't use Render or Oracle Cloud.
# REQUIREMENT: repo must be PUBLIC (private repos have 2000 min/month limit,
#              which this workflow would exceed). API keys stay safe in Secrets.
#
# HOW IT WORKS:
#   Two overlapping jobs cover the full US market day (9:30 AM - 4:15 PM ET):
#   - Job "morning":   starts 9:00 AM ET, runs 5h50m (killed before GitHub's 6h limit)
#   - Job "afternoon": starts 2:30 PM ET, covers the 15:45 ET entry check + close
#
#   The agent is stateless (loads positions from Alpaca on startup), so the
#   10-minute overlap and the restart between jobs are both safe.
#
# SETUP:
#   1. Make repo public (or accept the ~$10/month Actions cost for private)
#   2. Go to repo Settings → Secrets → Actions → New repository secret
#   3. Add each variable from .env as a secret (same names)

name: Trading Agent

on:
  schedule:
    # Morning job: 13:00 UTC = 9:00 AM EDT (summer) / 8:00 AM EST (winter)
    - cron: '0 13 * * 1-5'
    # Afternoon job: 18:30 UTC = 2:30 PM EDT / 1:30 PM EST
    # Covers entry check at 15:45 ET in both summer (19:45 UTC) and winter (20:45 UTC)
    - cron: '30 18 * * 1-5'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    # 350 min = 5h50m — ensures the morning job exits cleanly before
    # GitHub's hard 6h kill. The afternoon job has no tight timeout.
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'          # Caches pip deps — setup takes ~20s after first run

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          ALPACA_API_KEY:       ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:    ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:      ${{ secrets.ALPACA_BASE_URL }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m cli.main --aggressive
